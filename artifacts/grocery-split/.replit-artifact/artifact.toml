kind = "web"
previewPath = "/"
title = "GrocerySplit"
version = "1.0.0"
id = "artifacts/grocery-split"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24342

[services.development]
run = "pnpm --filter @workspace/grocery-split run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/grocery-split", "run", "build" ]
publicDir = "artifacts/grocery-split/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24342"
BASE_PATH = "/"
